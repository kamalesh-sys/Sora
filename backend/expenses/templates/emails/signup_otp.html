<!doctype html>
<html>
  <body style="margin:0;background:#f7f4ff;font-family:Arial,Helvetica,sans-serif;color:#111827;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f7f4ff;padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:520px;background:#ffffff;border-radius:24px;overflow:hidden;box-shadow:0 18px 45px rgba(124,92,255,0.16);">
            <tr>
              <td style="padding:30px 30px 18px;">
                <div style="font-size:24px;font-weight:800;">
                  <span style="color:#7c5cff;">Sora</span> Expense
                </div>
                <h1 style="font-size:26px;line-height:1.25;margin:28px 0 8px;">Verify your email</h1>
                <p style="font-size:15px;line-height:1.6;color:#667085;margin:0;">
                  Use this one-time code to finish creating your Sora Expense account.
                </p>
              </td>
            </tr>
            <tr>
              <td align="center" style="padding:8px 30px 26px;">
                <div style="display:inline-block;background:linear-gradient(135deg,#7c5cff,#a576ff);color:#ffffff;font-size:34px;font-weight:800;letter-spacing:8px;border-radius:18px;padding:18px 26px;">
                  {{ otp }}
                </div>
                <p style="font-size:14px;color:#667085;margin:18px 0 0;">
                  This code expires in {{ ttl_minutes }} minutes.
                </p>
              </td>
            </tr>
            <tr>
              <td style="background:#faf8ff;padding:18px 30px;color:#667085;font-size:13px;line-height:1.5;">
                If you did not request this code, you can safely ignore this email. Never share this code with anyone.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
